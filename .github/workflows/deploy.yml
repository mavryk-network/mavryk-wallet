name: Deploy to Chrome Web Store

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create .env for build
        run: |
          cat << 'EOF' > .env.local
          TEMPLE_WALLET_JITSU_TRACKING_HOST=${{ secrets.TEMPLE_WALLET_JITSU_TRACKING_HOST }}
          TEMPLE_WALLET_JITSU_WRITE_KEY=${{ secrets.TEMPLE_WALLET_JITSU_WRITE_KEY }}
          TEMPLE_WALLET_EXOLIX_API_KEY=${{ secrets.TEMPLE_WALLET_EXOLIX_API_KEY }}
          TEMPLE_WALLET_EVERSTAKE_API_KEY=${{ secrets.TEMPLE_WALLET_EVERSTAKE_API_KEY }}
          TEMPLE_WALLET_EVERSTAKE_LINK_ID=${{ secrets.TEMPLE_WALLET_EVERSTAKE_LINK_ID }}
          TEMPLE_WALLET_UTORG_SID=${{ secrets.TEMPLE_WALLET_UTORG_SID }}
          TEMPLE_WALLET_API_URL=${{ secrets.TEMPLE_WALLET_API_URL }}
          TEMPLE_WALLET_DEXES_API_URL=${{ secrets.TEMPLE_WALLET_DEXES_API_URL }}
          TEMPLE_WALLET_ROUTE3_AUTH_TOKEN=${{ secrets.TEMPLE_WALLET_ROUTE3_AUTH_TOKEN }}
          TEMPLE_WALLET_MOONPAY_API_KEY=${{ secrets.TEMPLE_WALLET_MOONPAY_API_KEY }}
          TEMPLE_FIREBASE_CONFIG=${{ secrets.TEMPLE_FIREBASE_CONFIG }}
          TEMPLE_FIREBASE_MESSAGING_VAPID_KEY=${{ secrets.TEMPLE_FIREBASE_MESSAGING_VAPID_KEY }}
          TEMPLE_WALLET_APP_HOST=${{ secrets.TEMPLE_WALLET_APP_HOST }}
          HYPELAB_API_URL=${{ secrets.HYPELAB_API_URL }}
          HYPELAB_SMALL_PLACEMENT_SLUG=${{ secrets.HYPELAB_SMALL_PLACEMENT_SLUG }}
          HYPELAB_HIGH_PLACEMENT_SLUG=${{ secrets.HYPELAB_HIGH_PLACEMENT_SLUG }}
          HYPELAB_WIDE_PLACEMENT_SLUG=${{ secrets.HYPELAB_WIDE_PLACEMENT_SLUG }}
          HYPELAB_NATIVE_PLACEMENT_SLUG=${{ secrets.HYPELAB_NATIVE_PLACEMENT_SLUG }}
          HYPELAB_PROPERTY_SLUG=${{ secrets.HYPELAB_PROPERTY_SLUG }}
          HYPELAB_ADS_WINDOW_URL=${{ secrets.HYPELAB_ADS_WINDOW_URL }}
          PERSONA_ADS_API_KEY=${{ secrets.PERSONA_ADS_API_KEY }}
          PERSONA_ADS_BANNER_UNIT_ID=${{ secrets.PERSONA_ADS_BANNER_UNIT_ID }}
          PERSONA_ADS_WIDE_BANNER_UNIT_ID=${{ secrets.PERSONA_ADS_WIDE_BANNER_UNIT_ID }}
          PERSONA_ADS_MEDIUM_BANNER_UNIT_ID=${{ secrets.PERSONA_ADS_MEDIUM_BANNER_UNIT_ID }}
          PERSONA_ADS_SQUARISH_BANNER_UNIT_ID=${{ secrets.PERSONA_ADS_SQUARISH_BANNER_UNIT_ID }}
          NODES_URL=${{ secrets.NODES_URL }}
          EXTERNAL_API=${{ secrets.EXTERNAL_API }}
          REDUX_DEVTOOLS_PORT=${{ secrets.REDUX_DEVTOOLS_PORT }}
          SUPER_ADMIN_PRIVATE_KEY=${{ secrets.SUPER_ADMIN_PRIVATE_KEY }}
          KYC_CONTRACT=${{ secrets.KYC_CONTRACT }}
          COINGECKO_API_KEY=${{ secrets.COINGECKO_API_KEY }}
          COINGECKO_API=${{ secrets.COINGECKO_API }}
          EOF

      - name: Build extension
        run: yarn build

      - name: Check zip has manifest at root
        run: |
          unzip -l dist/chrome.zip | head -n 40
          unzip -p dist/chrome.zip manifest.json | head -n 20

      - name: Deploy to Chrome Web Store
        uses: trmcnvn/chrome-addon@v2
        with:
          extension: ${{ secrets.CHROME_EXTENSION_ID }}
          zip: dist/chrome.zip
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
